<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emanuele Pizzuti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-col left">
      <span class="site-name">Emanuele Pizzuti</span>
    </div>
    <div class="header-col center">
      <span id="tagline" class="tagline"></span>
    </div>
    <div class="header-col right">
      <nav class="social-links">
        <a id="link-linkedin" href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a id="link-instagram" href="#" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a id="link-behance" href="#" target="_blank" rel="noopener noreferrer">Behance</a>
        <a id="link-email" href="#">Email</a>
      </nav>
    </div>
  </header>

  <main>
    <aside id="project-list">
      <div id="loading-msg" class="loading-msg">loading projects…</div>
    </aside>
    <section id="graph-section">
      <svg id="graph"></svg>
      <div id="graph-empty" class="graph-empty hidden">No fields to display.</div>
    </section>
  </main>

  <footer>
    <div class="marquee-track">
      <span class="marquee-text"></span>
      <span class="marquee-text" aria-hidden="true"></span>
    </div>
  </footer>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>

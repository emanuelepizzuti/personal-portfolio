<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emanuele Pizzuti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap');</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="header-col left">
      <span class="site-name">Emanuele Pizzuti</span>
    </div>
    <div class="header-col center">
      <span id="tagline" class="tagline"></span>
    </div>
    <div class="header-col right">
      <nav class="social-links">
        <a id="link-linkedin" href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a id="link-instagram" href="#" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a id="link-behance" href="#" target="_blank" rel="noopener noreferrer">Behance</a>
        <a id="link-email" href="#">Email</a>
      </nav>
    </div>
  </header>

  <main>
    <aside id="project-list">
      <div id="loading-msg" class="loading-msg">loading projects…</div>
    </aside>
    <section id="graph-section">
      <svg id="graph"></svg>
      <div id="graph-empty" class="graph-empty hidden">No fields to display.</div>
    </section>
  </main>

  <footer>
    <div class="marquee-track">
      <span class="marquee-text"></span>
      <span class="marquee-text" aria-hidden="true"></span>
    </div>
  </footer>

  <!-- Grainy glow filter for graph nodes (must NOT be display:none — use position trick instead) -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- default node glow -->
      <filter id="glow-grain" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
        <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
        <feFlood flood-color="white" flood-opacity="0.6" result="white"/>
        <feComposite in="white" in2="blur" operator="in" result="glow"/>
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="3" result="noise"/>
        <feDisplacementMap in="glow" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G" result="grainy"/>
        <feMerge>
          <feMergeNode in="grainy"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <!-- active / hover node glow (brighter, bigger) -->
      <filter id="glow-grain-active" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
        <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
        <feFlood flood-color="white" flood-opacity="0.9" result="white"/>
        <feComposite in="white" in2="blur" operator="in" result="glow"/>
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="3" result="noise"/>
        <feDisplacementMap in="glow" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G" result="grainy"/>
        <feMerge>
          <feMergeNode in="grainy"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </svg>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
